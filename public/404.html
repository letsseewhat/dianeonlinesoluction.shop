<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Diane Online Solutions</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .card {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 520px;
      width: 90%;
    }
    h1 {
      font-size: 72px;
      margin: 0 0 10px;
      color: #0f766e;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 24px;
    }
    p {
      margin: 0 0 24px;
      line-height: 1.5;
      color: #4b5563;
    }
    a {
      display: inline-block;
      padding: 12px 20px;
      background: #0f766e;
      color: #ffffff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 700;
    }
    a:hover {
      background: #115e59;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you requested could not be found. Please return to the homepage and continue from there.</p>
    <a href="/">Back to Home</a>
  </main>
</body>
</html>
